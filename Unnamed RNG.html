<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unnamed's RNG</title>
    <link rel="icon" type="image/x-icon" href="/media/images/favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/fe85db6219.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="starContainer"></div>
    <div class="oppHeartContainer"></div>

    <img class="cutsceneStar" src="media/images/cutscene_star.png" id="star">
    <img class="cutsceneHeart" src="media/images/oppression_heart.png" id="oppHeart">

    <div id="warningPopup" class="warning-popup">
        <h1>WARNING</h1>
    </div>
    <div id="geezerPopup" class="geezer-popup">
        <h1>If you click away from this, you are an idiot</h1>
    </div>
    <div class="info2">
        <div class="creator">
            <h3 class="cu1">Creator & Programmer:</h3>
            <br>
            <h2 class="cu">𝐔𝐧𝐧𝐚𝐦𝐞𝐝</h2>
            <div class="creatorUnnamed">
                <input type="text" value="not.unnamed" id="unnamedUser" hidden>
                <img class="unnamed" src="media/images/unnamed_pfp.gif" width="80px">
                <img class="unnamedDeco" src="media/images/unnamed_pfp_deco.png" width="100px" onclick="unnamedUser()">
            </div>
        </div>
    </div>
    <div class="info">
        <div class="betaTesters">
            <h3 class="es">Early Supporters: 2</h3>
            <h3 class="btge">𝙂𝙚𝙚𝙯𝙚𝙧 𝙄𝙩𝙖𝙙𝙤𝙧𝙞𝙩𝙤</h3>
            <div class="betaTesterGe">
                <input type="text" value="bingchillingmaster" id="geezerUser" hidden>
                <img class="geezer" src="media/images/geezer_pfp.png" onclick="geezerUser()">
            </div>
            <h3 class="esdx">Dxrk.</h3>
            <div class="earlySupporterDx">
                <input type="text" value="dxrk" id="dxrkUser" hidden>
                <img class="dxrk" src="media/images/dxrk_pfp.png" width="80px" onclick="dxrkUser()">
            </div>
            <h3 class="bt">Beta Testers: 3</h3>
            <h3 class="btbl">𝙂𝙚𝙚𝙯𝙚𝙧 𝙄𝙩𝙖𝙙𝙤𝙧𝙞𝙩𝙤</h3>
            <div class="betaTesterBl">
                <input type="text" value="bingchillingmaster" id="geezerUser" hidden>
                <img class="geezer" src="media/images/geezer_pfp.png" width="80px" onclick="geezerUser()">
            </div>
            <h3 class="btdx">Dxrk.</h3>
            <div class="betaTesterDx">
                <input type="text" value="dxrk" id="dxrkUser" hidden>
                <img class="dxrk" src="media/images/dxrk_pfp.png" width="80px" onclick="dxrkUser()">
            </div>
            
            <h3 class="btmi">Mintllie</h3>
            <div class="betaTesterMi">
                <input type="text" value="mintllie" id="mintllieUser" hidden>
                <img class="mintllie" src="media/images/mintllie_pfp.png" width="80px" onclick="mintllieUser()">
            </div>
        </div>
    </div>
    <h1>The event wil be over in: <p id="demo"></p></h1>
    <button id="toggleCreditsBtn">Show Credits</button>
    <button id="toggleRollDisplayBtn">Hide Roll & Display</button>
    <div class="container">
        <div class="containerInside">
            <h1 class="gameTitle">Unnamed RNG</h1>
            <button class="rButton" id="rollButton" onclick="clickSound()"><i id="roll" class="fa-solid fa-arrows-rotate"></i></button>
            <div class="res" id="result"></div>
        </div>
    </div>
    <button id="toggleInventoryBtn">Show Inventory</button>
    <div class="inventory">
        <div class="invent">
            <h2><i class="fa-solid fa-box-archive"></i> Inventory</h2>
            <h3 class="count">You have rolled <a class="totalCount" id="rollCountDisplay">0</a> times</h3>
            <button id="deleteAllButton">Delete All</button>
            <button id="deleteAllCommonButton">Delete All Common</button>
            <button id="deleteAllRareButton">Delete All Rare</button>
            <button id="deleteAllEpicButton">Delete All Epic</button>
            <button id="deleteAllLegendaryButton">Delete All Legendary</button>
            <button id="deleteAllImpossibleButton">Delete All Impossible</button>
            <button id="deleteAllPoweredButton">Delete All Powered</button>
            <button id="deleteAllSolarpowerButton">Delete All Solarpower</button>
            <button id="deleteAllUnstoppableButton">Delete All Unstoppable</button>
            <button id="deleteAllGargantuaButton">Delete All Gargantua</button>
            <button id="deleteAllOblivionButton">Delete All Oblivion</button>
            <button id="deleteAllIsekaiButton">Delete All Isekai</button>
            <button id="deleteAllEmergenciesButton">Delete All Emergencies</button>
            <button id="deleteAllSamuraiButton">Delete All Samurai</button>
            <button id="deleteAllContortionsButton">Delete All Contortions</button>
            <button id="deleteAllFrightButton">Delete All Fright</button>
            <button id="deleteAllSovereignButton">Delete All Sovereign</button>
            <button id="deleteAllUnnamedButton">Delete All Unnamed</button>
            <button id="deleteAllOvertureButton">Delete All Overture</button>
            <button id="deleteAllImpeachedButton">Delete All Impeached</button>
            <button id="deleteAllRNGMasterButton">Delete All RNG Master</button>
            <button id="deleteAll???Button">Delete All ???</button>
            <ul class="inv" id="inventoryList"></ul>
            <div class="pagination">
                <button id="backPageButton" class="pageButton" onclick="backPage()">First</button>
                <button id="prevPageButton" class="pageButton" onclick="prevPage()">Previous</button>
                <span class="pgNr" id="pageNumber"></span>
                <button id="nextPageButton" class="pageButton" onclick="nextPage()">Next</button>
                <button id="lastPageButton" class="pageButton" onclick="lastPage()">Last</button>
            </div>
        </div>
    </div>
    <audio id="click" src="media/sounds_and_music/click.wav"></audio>
    <audio id="suspenseAudio" src="media/sounds_and_music/suspence.mp3"></audio>
    <audio id="geezerSuspenceAudio" src="media/sounds_and_music/geezer_suspence.mp3"></audio>
    <audio id="polarrSuspenceAudio" src="media/sounds_and_music/polarr_suspence.mp3"></audio>
    <audio id="oppSuspenceAudio" src="media/sounds_and_music/oppression_suspence.mp3"></audio>
    <audio id="scareSuspenceAudio" src="media/sounds_and_music/scare_suspence.mp3"></audio>
    <audio id="isekaiAudio" src="media/sounds_and_music/isekai.mp3" loop></audio>
    <audio id="emerAudio" src="media/sounds_and_music/emergencies.mp3" loop></audio>
    <audio id="samuraiAudio" src="media/sounds_and_music/samurai.mp3" loop></audio>
    <audio id="contAudio" src="media/sounds_and_music/contortions.mp3" loop></audio>
    <audio id="unstoppableAudio" src="media/sounds_and_music/unstoppable.mp3" loop></audio>
    <audio id="gargantuaAudio" src="media/sounds_and_music/gargantua.mp3" loop></audio>
    <audio id="oblAudio" src="media/sounds_and_music/oblivion.mp3" loop></audio>
    <audio id="frightAudio" src="media/sounds_and_music/fright.mp3" loop></audio>
    <audio id="sovereignAudio" src="media/sounds_and_music/sovereign.ogg" loop></audio>
    <audio id="engorspaAudio" src="media/sounds_and_music/engorspa.mp3" loop></audio>
    <audio id="unnamedAudio" src="media/sounds_and_music/unnamed.mp3" loop></audio>
    <audio id="overtureAudio" src="media/sounds_and_music/overture.ogg" loop></audio>
    <audio id="impeachedAudio" src="media/sounds_and_music/impeached.ogg" loop></audio>
    <audio id="rngmasterAudio" src="media/sounds_and_music/rngmaster.mp3" loop></audio>
    <audio id="silcarAudio" src="media/sounds_and_music/sillycar.mp3" loop></audio>
    <audio id="brainrotAudio" src="media/sounds_and_music/brainrot.mp3" loop></audio>
    <audio id="gregAudio" src="media/sounds_and_music/greg.mp3" loop></audio>
    <audio id="mintllieAudio" src="media/sounds_and_music/mintllie.mp3" loop></audio>
    <audio id="geezerAudio" src="media/sounds_and_music/geezer.m4a" loop></audio>
    <audio id="polarrAudio" src="media/sounds_and_music/polarr.mp3" loop></audio>
    <audio id="surferAudio" src="media/sounds_and_music/surfer.mp3" loop></audio>
    <audio id="oppAudio" src="media/sounds_and_music/oppression.mpeg" loop></audio>
    <audio id="mainAudio" src="media/sounds_and_music/main.mp3" loop autoplay></audio>

    <button class="fullscreen-btn" onclick="toggleFullscreen()"><i class="fa-solid fa-expand"></i></button>

    <script src="script.js"></script>
</body>
</html>
